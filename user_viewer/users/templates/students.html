{% extends 'index.html' %}

{% block content %}
<h2> Student List </h2>
<ul>
    {% for student in Students %}
    <li> id: {{ student.id }}</li>
    <li> name: {{student.f_name}}</li>
    <li> email: {{student.email}}</li>
    <li> rol: {{student.rol}} </li>
    <li> mitjana: {{student.mean}}</li>
    </br>
    {% endfor %}
</ul>

{% endblock %}
