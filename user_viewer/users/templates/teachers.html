{% extends 'index.html' %}

{% block content %}
<h2> Teacher List </h2>
<ul>
    {% for teacher in Teachers %}
    <li> id: {{ teacher.id }}</li>
    <li> name: {{teacher.f_name}}</li>
    <li> email: {{teacher.email}}</li>
    <li> department: {{teacher.department}} </li>
    <li> tutor/a: {{teacher.is_tutor}}</li>
    </br>
    {% endfor %}
</ul>

{% endblock %}
