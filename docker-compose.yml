version: '3.1'
services:
  db:
    image: postgres:16
    container_name: db_django2526
    environment:
      - POSTGRES_DB=ITIC_DB
      - POSTGRES_PASSWORD=admin
      - POSTGRES_USER=admin
    ports:
      - "5432:5432"
    volumes:
      - local_pgdata:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: pg_django2526
    ports:
      - "80:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: roger@roger.cat
      PGADMIN_DEFAULT_PASSWORD: roger123
    volumes:
      - pgadmin-data:/var/lib/pgadmin
volumes:
  local_pgdata:
  pgadmin-data:
